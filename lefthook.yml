pre-commit:
  commands:
    # Typechecking MUST pass
    typecheck:
      glob: "*.{ts,tsx,d.ts,js,jsx,cjs,mjs}"
      run: bun --filter='./apps/*' --filter='./packages/*' run check:types

    # Autofix formatting issues
    fix:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bun run autofix --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

post-checkout:
  commands:
    # Install dependencies after checking out a new branch
    install:
      run: bun install

